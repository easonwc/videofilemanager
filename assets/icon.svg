  <rect x="79"  y="82" width="18" height="18" rx="3" fill="#1c1c1c"/>
  <rect x="115" y="82" width="18" height="18" rx="3" fill="#1c1c1c"/>
  <rect x="151" y="82" width="18" height="18" rx="3" fill="#1c1c1c"/>
